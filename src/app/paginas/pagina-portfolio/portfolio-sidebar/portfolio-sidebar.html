<button class="mobile-menu-toggle" type="button" aria-controls="portfolio-sidebar" [attr.aria-expanded]="isSidebarOpen"
  (click)="toggleSidebar()">
  <span aria-hidden="true">{{ isSidebarOpen ? '✕' : '☰' }}</span>
  <span>{{ isSidebarOpen ? 'Fechar menu' : 'Abrir menu' }}</span>
</button>

<div class="mobile-sidebar-overlay" [class.is-open]="isSidebarOpen" (click)="closeSidebar()" aria-hidden="true"></div>

<aside id="portfolio-sidebar" class="sidebar glass-panel" [class.is-open]="isSidebarOpen" aria-label="Barra lateral">
  <button class="sidebar-close-button" type="button" (click)="closeSidebar()" aria-label="Fechar menu">
    <span aria-hidden="true">✕</span>
    <span>Fechar menu</span>
  </button>

  <figure class="foto-slot" aria-label="Espaço para foto profissional">
    <img class="foto-placeholder" role="img" aria-label="Espaço reservado para foto" src="assets/img/perfil.jpeg"
      alt="Foto de Bruno Ferreira">
  </figure>

  <h1>Bruno Ferreira</h1>
  <p class="sidebar-role">Desenvolvedor Front-end | Full-stack em evolução</p>

  <nav aria-label="Navegação do portfólio" class="sidebar-nav">
    <a [routerLink]="['/portfolio']" fragment="home" [class.is-active]="activeSection === 'home'" (click)="scrollToSection('home', $event)">Início</a>
    <a [routerLink]="['/portfolio']" fragment="sobre" [class.is-active]="activeSection === 'sobre'" (click)="scrollToSection('sobre', $event)">Sobre
      mim</a>
    <a [routerLink]="['/portfolio']" fragment="servicos-section" [class.is-active]="activeSection === 'servicos-section'"
      (click)="scrollToSection('servicos-section', $event)">Serviços</a>
    <a [routerLink]="['/portfolio']" fragment="portfolio-section" [class.is-active]="activeSection === 'portfolio-section'"
      (click)="scrollToSection('portfolio-section', $event)">Projetos</a>
    <a [routerLink]="['/portfolio']" fragment="conhecimentos-section" [class.is-active]="activeSection === 'conhecimentos-section'"
      (click)="scrollToSection('conhecimentos-section', $event)">Conhecimentos</a>
    <a [routerLink]="['/portfolio']" fragment="experiencia-section" [class.is-active]="activeSection === 'experiencia-section'"
      (click)="scrollToSection('experiencia-section', $event)">Resumo</a>
    <a [routerLink]="['/portfolio']" fragment="contact-section" [class.is-active]="activeSection === 'contact-section'"
      (click)="scrollToSection('contact-section', $event)">Contato</a>
  </nav>
